<!-- PORTFOLIO -->
<section id="portfolio">
  <div class="wrap">
    <h2 style="margin-bottom:10px;">Portfolio</h2>
    
    <!-- CATEGORY ROW -->
    <div class="cat-row">
      <div class="card cat" data-gallery="baby"><h3>Baby Mobs</h3></div>
      <div class="card cat" data-gallery="baby-animals"><h3>Baby Animals</h3></div>
      <div class="card cat" data-gallery="furniture"><h3>Furniture</h3></div>
      <div class="card cat" data-gallery="weapons"><h3>Weapons</h3></div>
    </div>

    <!-- GALLERIES -->

    <!-- BABY MOBS -->
    <div id="gallery-baby" class="gallery card active">
      <div style="padding:16px 16px 0"><h3>Baby Mobs</h3></div>
      <div class="grid" style="padding:16px">
        <div class="tile" data-name="Wandering Trader"><img class="thumb" src="images/wandering_trader.png" alt="Wandering Trader"><div class="label">Wandering Trader</div></div>
        <div class="tile" data-name="Allay"><img class="thumb" src="images/allay.png" alt="Allay"><div class="label">Allay</div></div>
        <div class="tile" data-name="Bat"><img class="thumb" src="images/bat.png" alt="Bat"><div class="label">Bat</div></div>
        <div class="tile" data-name="Bee"><img class="thumb" src="images/bee.png" alt="Bee"><div class="label">Bee</div></div>
        <!-- rest of baby mobs... keep all your tiles as before -->
      </div>
    </div>

    <!-- BABY ANIMALS -->
    <div id="gallery-baby-animals" class="gallery card">
      <div style="padding:16px 16px 0"><h3>Baby Animals</h3></div>
      <div class="grid" style="padding:16px">
        <div class="tile" data-name="African Civet"><img class="thumb" src="images/african_civet.png" alt="African Civet"><div class="label">African Civet</div></div>
        <div class="tile" data-name="Babirusa"><img class="thumb" src="images/babirusa.png" alt="Babirusa"><div class="label">Babirusa</div></div>
        <div class="tile" data-name="Bat-Eared Fox"><img class="thumb" src="images/bat_eared_fox.png" alt="Bat-Eared Fox"><div class="label">Bat-Eared Fox</div></div>
        <!-- rest of baby animals... keep all your tiles as before -->
      </div>
    </div>

    <!-- FURNITURE -->
    <div id="gallery-furniture" class="gallery card">
      <div style="padding:16px 16px 0"><h3>Furniture</h3></div>
      <div class="grid" style="padding:16px">
        <div class="tile" data-name="Chair"><img class="thumb" src="images/furniture_chair.png" alt="Chair"><div class="label">Chair</div></div>
        <div class="tile" data-name="Table"><img class="thumb" src="images/furniture_table.png" alt="Table"><div class="label">Table</div></div>
        <div class="tile" data-name="Lamp"><img class="thumb" src="images/furniture_lamp.png" alt="Lamp"><div class="label">Lamp</div></div>
      </div>
    </div>

    <!-- WEAPONS -->
    <div id="gallery-weapons" class="gallery card">
      <div style="padding:16px 16px 0"><h3>Weapons</h3></div>
      <div class="grid" style="padding:16px">
        <a class="tile" href="https://sketchfab.com/" target="_blank" rel="noopener">
          <img class="thumb" src="images/weapon_placeholder.png" alt="Weapon Pack">
          <div class="label">Weapon Pack</div>
        </a>
        <div class="tile" data-name="Sword"><img class="thumb" src="images/sword.png" alt="Sword"><div class="label">Sword</div></div>
        <div class="tile" data-name="Axe"><img class="thumb" src="images/axe.png" alt="Axe"><div class="label">Axe</div></div>
        <div class="tile" data-name="Bow"><img class="thumb" src="images/bow.png" alt="Bow"><div class="label">Bow</div></div>
      </div>
    </div>

  </div>

  <!-- JS for gallery toggle -->
  <script>
    const cats = document.querySelectorAll('.cat');
    cats.forEach(cat => {
      cat.addEventListener('click', () => {
        const galleryName = cat.dataset.gallery;
        document.querySelectorAll('.gallery').forEach(g => g.classList.remove('active'));
        const gallery = document.getElementById('gallery-' + galleryName);
        if (gallery) gallery.classList.add('active');
      });
    });
  </script>
</section>
